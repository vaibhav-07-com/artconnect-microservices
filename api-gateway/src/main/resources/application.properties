spring.application.name=api-gateway
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=artist-service
spring.cloud.gateway.routes[0].uri=lb://artist-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/artist/**

spring.cloud.gateway.routes[1].id=portfolio-service
spring.cloud.gateway.routes[1].uri=lb://portfolio-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/portfolio/**



spring.application.name=api-gateway
server.port=8080
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.routes[0].id=artist-service
spring.cloud.gateway.routes[0].uri=lb://artist-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/artist/**

spring.cloud.gateway.routes[1].id=portfolio-service
spring.cloud.gateway.routes[1].uri=lb://portfolio-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/portfolio/**

spring.cloud.gateway.routes[2].id=license-service
spring.cloud.gateway.routes[2].uri=lb://license-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/license/**

spring.cloud.gateway.routes[3].id=notification-service
spring.cloud.gateway.routes[3].uri=lb://notification-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/notify/**

